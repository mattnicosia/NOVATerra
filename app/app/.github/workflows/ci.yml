name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npx eslint src/ --max-warnings 0

      - name: Format check
        run: npx prettier --check "src/**/*.{js,jsx,css}"

      - name: Test
        run: npx vitest run --reporter=verbose

      - name: Build
        run: npx vite build

      - name: Dead file audit
        run: node scripts/audit-dead-files.js --ci

      - name: Health report
        run: node scripts/health-report.js >> $GITHUB_STEP_SUMMARY
