<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NOVA</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta property="og:title" content="NOVA — AI-Powered Construction Estimating" />
    <meta property="og:description" content="Powered by NOVA. Scope sheets, bid management, and cost intelligence for general contractors." />
    <meta property="og:image" content="/novaterra-wordmark.png" />
    <meta property="og:type" content="website" />
    <meta name="impact-site-verification" value="6b15f0d7-4dcc-4556-95fd-17afef68780f" />
    <!-- Self-hosted fonts: Switzer (neo-grotesk UI) + JetBrains Mono (data/tabular) -->
    <!-- Chamber video preload for login page (Blender cinematic background) -->
    <link rel="preload" href="/chamber/chamber_poster.jpg" as="image" />
    <link rel="preload" href="/fonts/Switzer-Variable.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/JetBrainsMono-Variable-Latin.woff2" as="font" type="font/woff2" crossorigin />
    <style>
      @font-face {
        font-family: 'Switzer';
        font-style: normal;
        font-weight: 100 900;
        font-display: swap;
        src: url('/fonts/Switzer-Variable.woff2') format('woff2');
      }
      @font-face {
        font-family: 'Switzer';
        font-style: italic;
        font-weight: 100 900;
        font-display: swap;
        src: url('/fonts/Switzer-VariableItalic.woff2') format('woff2');
      }
      @font-face {
        font-family: 'JetBrains Mono';
        font-style: normal;
        font-weight: 400 700;
        font-display: swap;
        src: url('/fonts/JetBrainsMono-Variable-Latin.woff2') format('woff2');
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }
    </style>
    <style>
      /* Minimal loading screen — neutral, no color */
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      @keyframes shimmer {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(200%); }
      }
      .nova-load-root {
        display: flex; align-items: center; justify-content: center; flex-direction: column;
        height: 100vh; background: #fff;
      }
      .nova-load-logo {
        width: 280px; height: auto;
        animation: fadeIn 0.6s ease-out both;
      }
      .nova-load-shimmer {
        width: 60px; height: 1px; margin-top: 20px; border-radius: 1px;
        background: rgba(180,160,200,0.12); overflow: hidden; position: relative;
        animation: fadeIn 0.6s ease-out 0.2s both;
      }
      .nova-load-shimmer::after {
        content: ''; position: absolute; inset: 0; width: 50%; border-radius: 1px;
        background: linear-gradient(90deg, transparent, rgba(180,160,200,0.35), transparent);
        animation: shimmer 2s ease-in-out infinite;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="nova-load-root">
        <img src="/novaterra-wordmark.png" alt="NOVATerra" class="nova-load-logo" />
        <div class="nova-load-shimmer"></div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
