<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>NOVATerra — Visualization Modes</title>
<script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; color: #e0ddd5; font-family: 'Barlow', sans-serif; overflow: hidden; }
#map { width: 100vw; height: 100vh; }
.controls {
  position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 4px; z-index: 10; flex-wrap: wrap; justify-content: center;
  background: rgba(10,10,15,0.9); padding: 6px 10px; border-radius: 3px;
  border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(16px);
}
.controls button {
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
  color: #777; padding: 5px 12px; font-size: 10px; font-family: 'Barlow Condensed', sans-serif;
  text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer;
  transition: all 0.2s; border-radius: 2px;
}
.controls button:hover { background: rgba(255,255,255,0.1); color: #ddd; }
.controls button.active { background: rgba(0,212,170,0.15); border-color: #00D4AA; color: #00D4AA; }
.hud-tl { position: fixed; top: 14px; left: 16px; z-index: 10; }
.hud-tl .brand { color: #00D4AA; font-size: 10px; font-family: 'Barlow Condensed'; text-transform: uppercase; letter-spacing: 0.15em; }
.hud-tl .title { color: #e0ddd5; font-size: 20px; font-weight: 600; font-family: 'Barlow Condensed'; }
.hud-tr { position: fixed; top: 14px; right: 16px; z-index: 10; text-align: right; }
.hud-tr .label { color: #555; font-size: 9px; font-family: 'Barlow Condensed'; text-transform: uppercase; letter-spacing: 0.12em; }
.hud-tr .value { color: #00D4AA; font-size: 26px; font-weight: 700; font-family: 'Barlow Condensed'; }
.legend {
  position: fixed; bottom: 16px; left: 16px; z-index: 10;
  background: rgba(10,10,15,0.9); padding: 10px 14px; border-radius: 3px;
  border: 1px solid rgba(255,255,255,0.06); backdrop-filter: blur(16px); font-size: 11px;
}
.legend-title { color: #555; text-transform: uppercase; letter-spacing: 0.12em; font-size: 9px; margin-bottom: 6px; font-family: 'Barlow Condensed'; }
.legend-item { display: flex; align-items: center; gap: 8px; margin: 3px 0; color: #999; font-size: 11px; }
.legend-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.mode-desc {
  position: fixed; bottom: 16px; right: 16px; z-index: 10;
  background: rgba(10,10,15,0.9); padding: 8px 14px; border-radius: 3px;
  border: 1px solid rgba(255,255,255,0.06); backdrop-filter: blur(16px);
  font-size: 11px; color: #666; max-width: 260px; line-height: 1.4;
}
</style>
</head>
<body>
<div class="hud-tl">
  <div class="brand">NOVATERRA</div>
  <div class="title">Pipeline Map</div>
</div>
<div class="hud-tr">
  <div class="label">Portfolio</div>
  <div class="value">$3.4M</div>
</div>
<div class="controls" id="controls"></div>
<div class="legend" id="legend"></div>
<div class="mode-desc" id="modeDesc"></div>
<div id="map"></div>

<script>
mapboxgl.accessToken = 'pk.eyJ1IjoibWF0dG5pY29zaWEiLCJhIjoiY21uNDJsM2NnMWthZjJ0cTJkdWZmeWplMiJ9.lEoeGN-_aDlAD_a7mOgy5g';

const projects = [
  { name: "36 Old School House", lng: -74.0589, lat: 41.1847, status: "bidding", value: 760000, sf: 3750, floors: 2, type: "residential" },
  { name: "28 Liberty St", lng: -74.0071, lat: 40.7074, status: "won", value: 420000, sf: 2800, floors: 1, type: "commercial" },
  { name: "Popup Bagel", lng: -80.1392, lat: 25.9565, status: "bidding", value: 185000, sf: 1200, floors: 1, type: "commercial" },
  { name: "MK Showroom", lng: -74.0060, lat: 40.7128, status: "bidding", value: 320000, sf: 2400, floors: 1, type: "commercial" },
  { name: "Starbucks", lng: -74.1724, lat: 40.7357, status: "pending", value: 95000, sf: 1800, floors: 1, type: "commercial" },
  { name: "PWYC Clubhouse", lng: -73.9857, lat: 41.2390, status: "won", value: 580000, sf: 4200, floors: 2, type: "commercial" },
  { name: "Spark Newburgh", lng: -74.0104, lat: 41.5034, status: "hold", value: 445000, sf: 5000, floors: 3, type: "mixed-use" },
  { name: "Mainbridge Commons", lng: -74.0241, lat: 41.1120, status: "bidding", value: 890000, sf: 12000, floors: 4, type: "residential" },
  { name: "Wolkoff Office", lng: -73.9442, lat: 40.7295, status: "won", value: 210000, sf: 1600, floors: 1, type: "commercial" },
  { name: "Welcome Homes", lng: -73.8900, lat: 41.2980, status: "lost", value: 175000, sf: 2200, floors: 2, type: "residential" },
];

const SC = { bidding: '#00BFFF', won: '#00D4AA', lost: '#333', hold: '#FFB020', pending: '#FF6B00' };
const SL = { bidding: 'Bidding', won: 'Awarded', lost: 'Lost', hold: 'On Hold', pending: 'Pending' };

const MODES = {
  pulseMarkers: { label: 'Pulse', desc: 'Animated pulsing markers. Size reflects project value.' },
  heatGlow: { label: 'Heat', desc: 'Thermal glow pools showing project density and value concentration.' },
  lightBeams: { label: 'Beams', desc: 'Vertical light columns. Height = project value.' },
  extruded3D: { label: '3D Blocks', desc: 'Extruded building volumes sized by SF and floor count.' },
  dataColumns: { label: 'Columns', desc: 'Abstract data bars. Height = value. A 3D chart on the earth.' },
  radarPing: { label: 'Radar', desc: 'Sonar pings from active projects. Urgency affects ping speed.' },
  connections: { label: 'Network', desc: 'Arcs connecting nearby projects. Shows geographic clusters.' },
  clusters: { label: 'Clusters', desc: 'Region groupings with aggregate metrics.' },
  holographic: { label: 'Hologram', desc: 'Translucent volumes with floor lines. The future projected on reality.' },
};

let map, markers = [], currentMode = 'pulseMarkers';

map = new mapboxgl.Map({
  container: 'map',
  style: 'mapbox://styles/mapbox/dark-v11',
  center: [-74.0, 40.95],
  zoom: 8.5,
  pitch: 50,
  bearing: -10,
  antialias: true,
});
map.addControl(new mapboxgl.NavigationControl({ visualizePitch: true }), 'bottom-right');

// Build buttons
const ce = document.getElementById('controls');
Object.entries(MODES).forEach(([k, m]) => {
  const b = document.createElement('button');
  b.textContent = m.label; b.dataset.mode = k;
  if (k === currentMode) b.classList.add('active');
  b.onclick = () => switchMode(k);
  ce.appendChild(b);
});

function switchMode(m) {
  currentMode = m;
  document.querySelectorAll('.controls button').forEach(b => b.classList.toggle('active', b.dataset.mode === m));
  document.getElementById('modeDesc').textContent = MODES[m].desc;
  clearAll(); renderMode(m);
}

function clearAll() {
  markers.forEach(m => m.remove()); markers = [];
  ['p-circle','p-pulse','p-heat','p-beams','p-beams-glow','p-ext','p-col',
   'p-conn','p-holo','p-holo-fl'].forEach(id => { if (map.getLayer(id)) map.removeLayer(id); });
  ['ps','ps-h','ps-b','ps-bg','ps-e','ps-c','ps-cn','ps-ho','ps-hf'].forEach(id => { if (map.getSource(id)) map.removeSource(id); });
}

function gj() {
  return { type: 'FeatureCollection', features: projects.map(p => ({
    type: 'Feature', geometry: { type: 'Point', coordinates: [p.lng, p.lat] },
    properties: { ...p, color: SC[p.status] || '#666', vn: p.value / 900000 }
  }))};
}

function updateLegend() {
  document.getElementById('legend').innerHTML = '<div class="legend-title">Status</div>' +
    Object.entries(SC).map(([k, c]) => `<div class="legend-item"><div class="legend-dot" style="background:${c}"></div>${SL[k]}</div>`).join('');
}

function renderMode(m) { updateLegend(); ({
  pulseMarkers: rPulse, heatGlow: rHeat, lightBeams: rBeams, extruded3D: rExt,
  dataColumns: rCol, radarPing: rRadar, connections: rConn, clusters: rCluster, holographic: rHolo
})[m](); }

// 1. Pulse
function rPulse() {
  projects.forEach(p => {
    const sz = 14 + (p.value/900000)*28, c = SC[p.status];
    const el = document.createElement('div');
    el.innerHTML = `<div style="position:relative;width:${sz}px;height:${sz}px;cursor:pointer;">
      <div style="position:absolute;inset:0;border-radius:50%;background:${c};opacity:0.85;box-shadow:0 0 ${sz}px ${c},0 0 ${sz*2}px ${c}30;"></div>
      <div style="position:absolute;inset:-60%;border-radius:50%;border:1.5px solid ${c};opacity:0;animation:pp 2.5s ease-out infinite;"></div>
      <div style="position:absolute;inset:-60%;border-radius:50%;border:1px solid ${c};opacity:0;animation:pp 2.5s ease-out infinite 0.8s;"></div>
    </div><style>@keyframes pp{0%{transform:scale(0.4);opacity:0.7}100%{transform:scale(1.4);opacity:0}}</style>`;
    el.title = `${p.name}\n$${(p.value/1000).toFixed(0)}K · ${p.sf.toLocaleString()} SF`;
    markers.push(new mapboxgl.Marker({ element: el, anchor: 'center' }).setLngLat([p.lng, p.lat]).addTo(map));
  });
}

// 2. Heat
function rHeat() {
  map.addSource('ps-h', { type: 'geojson', data: gj() });
  map.addLayer({ id: 'p-heat', type: 'heatmap', source: 'ps-h', paint: {
    'heatmap-weight': ['get', 'vn'], 'heatmap-intensity': 1.8, 'heatmap-radius': 80, 'heatmap-opacity': 0.65,
    'heatmap-color': ['interpolate',['linear'],['heatmap-density'],0,'rgba(0,0,0,0)',0.15,'rgba(0,60,80,0.3)',
      0.35,'rgba(0,140,140,0.45)',0.55,'rgba(0,212,170,0.55)',0.75,'rgba(50,255,210,0.65)',1,'rgba(150,255,230,0.85)']
  }});
  projects.forEach(p => {
    const el = document.createElement('div');
    el.style.cssText = `width:6px;height:6px;border-radius:50%;background:${SC[p.status]};box-shadow:0 0 4px ${SC[p.status]};cursor:pointer;`;
    el.title = `${p.name} · $${(p.value/1000).toFixed(0)}K`;
    markers.push(new mapboxgl.Marker({ element: el, anchor: 'center' }).setLngLat([p.lng, p.lat]).addTo(map));
  });
}

// 3. Beams
function rBeams() {
  const f = projects.map(p => ({ type: 'Feature',
    geometry: { type: 'Polygon', coordinates: [bp(p.lng, p.lat, 0.0008)] },
    properties: { color: SC[p.status], height: (p.value/900000)*8000+800 }
  }));
  map.addSource('ps-b', { type: 'geojson', data: { type: 'FeatureCollection', features: f } });
  map.addLayer({ id: 'p-beams', type: 'fill-extrusion', source: 'ps-b', paint: {
    'fill-extrusion-color': ['get','color'], 'fill-extrusion-height': ['get','height'],
    'fill-extrusion-base': 0, 'fill-extrusion-opacity': 0.35
  }});
  map.addSource('ps-bg', { type: 'geojson', data: gj() });
  map.addLayer({ id: 'p-beams-glow', type: 'circle', source: 'ps-bg', paint: {
    'circle-radius': 30, 'circle-color': ['get','color'], 'circle-blur': 1, 'circle-opacity': 0.25
  }});
  projects.forEach(p => {
    const el = document.createElement('div');
    el.innerHTML = `<div style="font-family:'Barlow Condensed';font-size:10px;color:${SC[p.status]};
      text-transform:uppercase;letter-spacing:0.1em;text-shadow:0 0 10px ${SC[p.status]}60;white-space:nowrap;">${p.name}</div>`;
    markers.push(new mapboxgl.Marker({ element: el, anchor: 'bottom' }).setLngLat([p.lng, p.lat]).addTo(map));
  });
}
function bp(x, y, s) { return [[x-s,y-s],[x+s,y-s],[x+s,y+s],[x-s,y+s],[x-s,y-s]]; }

// 4. 3D Ext
function rExt() {
  const f = projects.map(p => {
    const w = p.sf > 5000 ? 0.0025 : p.sf > 2000 ? 0.0016 : 0.001;
    return { type: 'Feature', geometry: { type: 'Polygon', coordinates: [bp(p.lng, p.lat, w)] },
      properties: { color: SC[p.status], height: p.floors * 50 + 30 }};
  });
  map.addSource('ps-e', { type: 'geojson', data: { type: 'FeatureCollection', features: f } });
  map.addLayer({ id: 'p-ext', type: 'fill-extrusion', source: 'ps-e', paint: {
    'fill-extrusion-color': ['get','color'], 'fill-extrusion-height': ['get','height'],
    'fill-extrusion-base': 0, 'fill-extrusion-opacity': 0.7
  }});
}

// 5. Data Columns
function rCol() {
  const f = projects.map(p => ({ type: 'Feature',
    geometry: { type: 'Polygon', coordinates: [bp(p.lng, p.lat, 0.0006)] },
    properties: { color: SC[p.status], height: (p.value/900000)*5000+300 }
  }));
  map.addSource('ps-c', { type: 'geojson', data: { type: 'FeatureCollection', features: f } });
  map.addLayer({ id: 'p-col', type: 'fill-extrusion', source: 'ps-c', paint: {
    'fill-extrusion-color': ['get','color'], 'fill-extrusion-height': ['get','height'],
    'fill-extrusion-base': 0, 'fill-extrusion-opacity': 0.8
  }});
  projects.forEach(p => {
    const el = document.createElement('div');
    el.innerHTML = `<div style="font-family:'Barlow';text-align:center;">
      <div style="font-size:13px;font-weight:700;color:${SC[p.status]};text-shadow:0 0 10px ${SC[p.status]}60;">$${(p.value/1000).toFixed(0)}K</div>
      <div style="font-size:9px;color:#555;text-transform:uppercase;letter-spacing:0.08em;">${p.name}</div></div>`;
    markers.push(new mapboxgl.Marker({ element: el, anchor: 'bottom' }).setLngLat([p.lng, p.lat]).addTo(map));
  });
}

// 6. Radar
function rRadar() {
  projects.forEach(p => {
    const c = SC[p.status], spd = p.status==='pending'?'1.2s':p.status==='bidding'?'2s':'3.5s';
    const el = document.createElement('div');
    el.innerHTML = `<div style="position:relative;width:70px;height:70px;cursor:pointer;">
      <div style="position:absolute;inset:0;border-radius:50%;border:1px solid ${c};opacity:0;animation:rr ${spd} ease-out infinite;"></div>
      <div style="position:absolute;inset:12%;border-radius:50%;border:1px solid ${c};opacity:0;animation:rr ${spd} ease-out infinite 0.25s;"></div>
      <div style="position:absolute;inset:24%;border-radius:50%;border:1px solid ${c};opacity:0;animation:rr ${spd} ease-out infinite 0.5s;"></div>
      <div style="position:absolute;left:50%;top:50%;width:5px;height:5px;margin:-2.5px;border-radius:50%;background:${c};box-shadow:0 0 6px ${c};"></div>
    </div><style>@keyframes rr{0%{transform:scale(0.3);opacity:0.7}100%{transform:scale(1.1);opacity:0}}</style>`;
    el.title = `${p.name} · ${SL[p.status]}`;
    markers.push(new mapboxgl.Marker({ element: el, anchor: 'center' }).setLngLat([p.lng, p.lat]).addTo(map));
  });
}

// 7. Connections
function rConn() {
  const lines = [];
  for (let i = 0; i < projects.length; i++) {
    for (let j = i+1; j < projects.length; j++) {
      const a=projects[i], b=projects[j];
      const d = Math.sqrt((a.lng-b.lng)**2 + (a.lat-b.lat)**2);
      if (d < 0.6) {
        const pts = []; const n = 24;
        for (let k=0; k<=n; k++) { const t=k/n;
          pts.push([a.lng+(b.lng-a.lng)*t, a.lat+(b.lat-a.lat)*t + Math.sin(t*Math.PI)*d*0.25]);
        }
        lines.push({ type:'Feature', geometry:{type:'LineString',coordinates:pts}, properties:{} });
      }
    }
  }
  map.addSource('ps-cn', { type:'geojson', data:{type:'FeatureCollection',features:lines} });
  map.addLayer({ id:'p-conn', type:'line', source:'ps-cn', paint: {
    'line-color':'#00D4AA', 'line-width':1.5, 'line-opacity':0.35, 'line-dasharray':[2,3]
  }});
  projects.forEach(p => {
    const el = document.createElement('div');
    el.innerHTML = `<div style="width:10px;height:10px;border-radius:50%;background:${SC[p.status]};
      box-shadow:0 0 10px ${SC[p.status]},0 0 20px ${SC[p.status]}30;cursor:pointer;"></div>`;
    el.title = p.name;
    markers.push(new mapboxgl.Marker({ element: el, anchor: 'center' }).setLngLat([p.lng, p.lat]).addTo(map));
  });
}

// 8. Clusters
function rCluster() {
  const regions = {
    'NYC Metro': projects.filter(p => p.lat<40.8 && p.lat>40.6),
    'Hudson Valley': projects.filter(p => p.lat>=40.8 && p.lat<41.6 && p.lng>-74.5),
    'Florida': projects.filter(p => p.lat<30),
  };
  Object.entries(regions).forEach(([name, group]) => {
    if (!group.length) return;
    const aLng = group.reduce((s,p)=>s+p.lng,0)/group.length;
    const aLat = group.reduce((s,p)=>s+p.lat,0)/group.length;
    const tv = group.reduce((s,p)=>s+p.value,0);
    const el = document.createElement('div');
    el.innerHTML = `<div style="font-family:'Barlow Condensed';text-align:center;padding:6px 14px;
      background:rgba(0,212,170,0.06);border:1px solid rgba(0,212,170,0.25);border-radius:3px;backdrop-filter:blur(6px);">
      <div style="font-size:12px;font-weight:600;color:#00D4AA;text-transform:uppercase;letter-spacing:0.08em;">${name}</div>
      <div style="font-size:10px;color:#666;margin-top:2px;">${group.length} projects · $${(tv/1000).toFixed(0)}K</div></div>`;
    markers.push(new mapboxgl.Marker({ element: el, anchor: 'center' }).setLngLat([aLng, aLat]).addTo(map));
    group.forEach(p => {
      const d = document.createElement('div');
      d.style.cssText = `width:8px;height:8px;border-radius:50%;background:${SC[p.status]};box-shadow:0 0 6px ${SC[p.status]};cursor:pointer;`;
      d.title = `${p.name} · $${(p.value/1000).toFixed(0)}K`;
      markers.push(new mapboxgl.Marker({ element: d, anchor: 'center' }).setLngLat([p.lng, p.lat]).addTo(map));
    });
  });
}

// 9. Holographic
function rHolo() {
  const f = projects.map(p => {
    const w = p.sf>5000?0.0025:p.sf>2000?0.0016:0.001;
    return { type:'Feature', geometry:{type:'Polygon',coordinates:[bp(p.lng,p.lat,w)]},
      properties:{color:SC[p.status],height:p.floors*60+40}};
  });
  // Floor plates
  const ff = projects.flatMap(p => {
    const w = (p.sf>5000?0.0025:p.sf>2000?0.0016:0.001)*0.99;
    const h = p.floors*60+40;
    const plates = [];
    for (let i=0; i<=p.floors; i++) {
      const fh = (i/p.floors)*h;
      plates.push({ type:'Feature', geometry:{type:'Polygon',coordinates:[bp(p.lng,p.lat,w)]},
        properties:{color:SC[p.status],height:fh+3,base:fh}});
    }
    return plates;
  });
  map.addSource('ps-ho', { type:'geojson', data:{type:'FeatureCollection',features:f}});
  map.addLayer({ id:'p-holo', type:'fill-extrusion', source:'ps-ho', paint: {
    'fill-extrusion-color':['get','color'], 'fill-extrusion-height':['get','height'],
    'fill-extrusion-base':0, 'fill-extrusion-opacity':0.18
  }});
  map.addSource('ps-hf', { type:'geojson', data:{type:'FeatureCollection',features:ff}});
  map.addLayer({ id:'p-holo-fl', type:'fill-extrusion', source:'ps-hf', paint: {
    'fill-extrusion-color':['get','color'], 'fill-extrusion-height':['get','height'],
    'fill-extrusion-base':['get','base'], 'fill-extrusion-opacity':0.5
  }});
  projects.forEach(p => {
    const el = document.createElement('div');
    el.innerHTML = `<div style="font-family:'Barlow Condensed';font-size:10px;color:${SC[p.status]};
      text-transform:uppercase;letter-spacing:0.1em;text-shadow:0 0 10px ${SC[p.status]}50;white-space:nowrap;
      padding:2px 6px;background:rgba(0,0,0,0.6);border:1px solid ${SC[p.status]}30;border-radius:2px;">${p.name}</div>`;
    markers.push(new mapboxgl.Marker({ element: el, anchor: 'bottom' }).setLngLat([p.lng, p.lat]).addTo(map));
  });
}

map.on('style.load', () => renderMode(currentMode));
document.getElementById('modeDesc').textContent = MODES[currentMode].desc;
</script>
</body>
</html>
