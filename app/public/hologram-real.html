  for (let i = 0; i < 2; i++) {
    const sl = new THREE.Mesh(
      new THREE.PlaneGeometry(bw * 1.2, 0.02),
      new THREE.MeshBasicMaterial({ color: p.color, transparent: true, opacity: 0, side: THREE.DoubleSide })
    );
    sl.rotation.x = -Math.PI/2;
    sl.userData.scan = { speed: 1.5 + i * 0.7, offset: i * 3, maxH: wallH + 1 };
    group.add(sl);
  }
}

window.setPhase = function(ph) {
  buildReal(ph);
  document.querySelectorAll('#phase div').forEach(d => d.classList.remove('active'));
  document.querySelector(`#phase div[onclick*="${ph}"]`).classList.add('active');
};
buildReal('rom');

// Animate
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  const t = performance.now() * 0.001;
  group.children.forEach(c => {
    if (c.userData.pulse) { c.scale.setScalar(1 + Math.sin(t*2)*0.08); c.material.opacity = 0.3 + Math.sin(t*2)*0.3; }
    if (c.userData.scan) { const s = c.userData.scan; const y = ((t*s.speed+s.offset)%(s.maxH+2))-1; c.position.y = y; c.material.opacity = y>0&&y<s.maxH ? 0.25 : 0; }
  });
  group.position.y = Math.sin(t * 0.4) * 0.03;
  composer.render();
}
animate();

addEventListener('resize', () => { camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); composer.setSize(innerWidth,innerHeight); });
</script>
</body>
