services:
  - type: web
    name: novaterra-vector-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 30
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
    plan: free
    rootDir: vector-api
